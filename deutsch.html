<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch – Sprachaufzeichnung</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', 'Arial', sans-serif;
    background: #f8f7f4;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 24px 20px 48px;
    max-width: 800px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  h1 {
    font-size: 17px;
    font-weight: 500;
    color: #333;
  }
  .rec-badge {
    display: none;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #c0392b;
    background: #fff5f4;
    border: 1px solid #e8bdb9;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .rec-badge.show { display: flex; }
  .rec-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #c0392b;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* タブ切り替え */
  .tab-row {
    display: flex;
    gap: 0;
    margin-bottom: 12px;
    border-bottom: 2px solid #e8e6e0;
  }
  .tab-btn {
    padding: 9px 18px;
    font-size: 13px;
    font-family: inherit;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    color: #aaa;
    cursor: pointer;
    transition: color .15s, border-color .15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab-btn:hover { color: #555; background: none; }
  .tab-btn.active {
    color: #1a1a1a;
    border-bottom-color: #1a1a1a;
    font-weight: 500;
  }

  /* 手入力エリア */
  .input-box {
    background: #fff;
    border: 1px solid #e8e6e0;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .input-box .label {
    font-size: 11px;
    color: #bbb;
    margin-bottom: 10px;
    letter-spacing: .03em;
  }
  #text-input {
    width: 100%;
    min-height: 160px;
    font-size: 18px;
    line-height: 1.8;
    color: #1a1a1a;
    border: none;
    outline: none;
    resize: vertical;
    font-family: inherit;
    background: transparent;
  }
  #text-input::placeholder { color: #ccc; }

  .input-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #f0ede8;
  }
  .btn-use {
    padding: 8px 16px;
    font-size: 13px;
    font-family: inherit;
    border: 1px solid #999;
    border-radius: 8px;
    background: #1a1a1a;
    color: #fff;
    cursor: pointer;
    font-weight: 500;
    transition: background .15s;
  }
  .btn-use:hover { background: #333; }
  .btn-use:disabled { opacity:.35; cursor:not-allowed; }
  .btn-clear-input {
    padding: 8px 14px;
    font-size: 13px;
    font-family: inherit;
    border: 1px solid #d0cec8;
    border-radius: 8px;
    background: #fff;
    color: #888;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-clear-input:hover { background: #f0ede8; }

  /* 音声入力エリア（既存） */
  .transcript-box {
    background: #fff;
    border: 1px solid #e8e6e0;
    border-radius: 12px;
    padding: 20px;
    min-height: 200px;
    margin-bottom: 12px;
    position: relative;
  }
  .transcript-box .label {
    font-size: 11px;
    color: #bbb;
    margin-bottom: 12px;
    letter-spacing: .03em;
  }
  #transcript {
    font-size: 20px;
    line-height: 1.8;
    color: #1a1a1a;
    min-height: 80px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #interim {
    font-size: 18px;
    color: #bbb;
    font-style: italic;
    margin-top: 4px;
  }
  .placeholder {
    color: #ccc;
    font-size: 16px;
  }

  /* 確定テキスト表示エリア */
  .result-box {
    background: #f8f7f4;
    border: 1px solid #e8e6e0;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .result-box .label {
    font-size: 11px;
    color: #bbb;
    margin-bottom: 10px;
    letter-spacing: .03em;
  }
  #result-text {
    font-size: 18px;
    line-height: 1.8;
    color: #1a1a1a;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 40px;
  }
  .result-empty { color: #ccc; font-size: 15px; }

  /* ボタン行 */
  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  button {
    padding: 11px 18px;
    font-size: 14px;
    border: 1px solid #d0cec8;
    border-radius: 8px;
    background: #fff;
    color: #1a1a1a;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s;
  }
  button:hover { background: #f0ede8; }
  button:disabled { opacity: .35; cursor: not-allowed; }
  .btn-main {
    font-weight: 500;
    border-color: #999;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .btn-main.recording {
    background: #fff5f4;
    border-color: #e8bdb9;
    color: #c0392b;
  }
  .btn-clear { color: #888; }

  /* プロンプト選択 */
  .prompt-section {
    background: #fff;
    border: 1px solid #e8e6e0;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .prompt-label {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 10px;
  }
  .prompt-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .prompt-btn {
    padding: 7px 14px;
    font-size: 13px;
    border: 1px solid #e0ddd8;
    border-radius: 20px;
    background: #f8f7f4;
    color: #555;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }
  .prompt-btn:hover {
    background: #fff;
    border-color: #999;
    color: #1a1a1a;
  }

  .status {
    font-size: 13px;
    color: #aaa;
    min-height: 20px;
    text-align: center;
  }
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a; color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0; transition: opacity .2s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* タブパネル */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* モバイル対応 */
  @media (max-width: 480px) {
    #text-input { font-size: 16px; }
    .prompt-btns { gap: 6px; }
    .prompt-btn { font-size: 12px; padding: 6px 11px; }
  }
</style>
</head>
<body>

<header>
  <h1>Deutsch – Texteingabe &amp; Sprachaufzeichnung</h1>
  <span class="rec-badge" id="rec-badge">
    <span class="rec-dot"></span>Aufnahme läuft
  </span>
</header>

<!-- タブ切り替え -->
<div class="tab-row">
  <button class="tab-btn active" onclick="switchTab('type')" id="tab-type">
    ✏️ テキスト入力
  </button>
  <button class="tab-btn" onclick="switchTab('voice')" id="tab-voice">
    🎙️ 音声入力
  </button>
</div>

<!-- ===== テキスト入力パネル ===== -->
<div class="tab-panel active" id="panel-type">
  <div class="input-box">
    <div class="label">ドイツ語を入力 / 貼り付け</div>
    <textarea id="text-input" placeholder="Schreiben Sie hier auf Deutsch …&#10;（ここにドイツ語を入力またはペーストしてください）" spellcheck="true" lang="de"></textarea>
    <div class="input-actions">
      <button class="btn-clear-input" onclick="clearTextInput()">クリア</button>
      <button class="btn-use" onclick="useTextInput()">このテキストを使う ✓</button>
    </div>
  </div>
</div>

<!-- ===== 音声入力パネル ===== -->
<div class="tab-panel" id="panel-voice">
  <div class="transcript-box">
    <div class="label">音声認識テキスト（リアルタイム）</div>
    <div id="transcript">
      <span class="placeholder">Drücken Sie „Aufnahme starten" und sprechen Sie auf Deutsch.</span>
    </div>
    <div id="interim"></div>
  </div>
  <div class="btn-row">
    <button class="btn-main" id="btn-rec" onclick="toggleRec()">
      <svg id="mic-icon" width="15" height="15" viewBox="0 0 16 16" fill="none">
        <rect x="5" y="1" width="6" height="9" rx="3" stroke="currentColor" stroke-width="1.2" fill="none"/>
        <path d="M2.5 8.5C2.5 11.538 4.962 14 8 14s5.5-2.462 5.5-5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        <line x1="8" y1="14" x2="8" y2="15.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <span id="btn-label">Aufnahme starten</span>
    </button>
    <button class="btn-clear" onclick="clearVoice()">音声テキストをクリア</button>
  </div>
</div>

<!-- ===== 確定テキスト（両モード共通） ===== -->
<div class="result-box">
  <div class="label">Claude に送るテキスト ↓</div>
  <div id="result-text"><span class="result-empty">テキスト入力または音声認識後にここに表示されます</span></div>
</div>

<!-- プロンプト選択 -->
<div class="prompt-section">
  <div class="prompt-label">テキストをコピーして Claude.ai へ</div>
  <div class="prompt-btns">
    <button class="prompt-btn" onclick="copyWith('raw')">テキストのみコピー</button>
    <button class="prompt-btn" onclick="copyWith('correct')">自然なドイツ語に直す ↗</button>
    <button class="prompt-btn" onclick="copyWith('vocab')">重要表現・語彙を教える ↗</button>
    <button class="prompt-btn" onclick="copyWith('feedback')">総合フィードバック ↗</button>
  </div>
</div>

<div class="status" id="status"></div>
<div class="toast" id="toast"></div>

<script>
let rec = null, going = false, voiceFull = '';
let finalText = ''; // 確定テキスト（テキスト入力 or 音声）

const prompts = {
  raw: '',
  correct: `以下は参加者がドイツ語授業で話したドイツ語の文字起こしです。
内容を保ちながら、より自然なドイツ語の表現に直してください。
元の表現と修正後の表現を並べて示し、修正点を簡単に説明してください。

【文字起こし】
`,
  vocab: `以下は参加者がドイツ語授業で話したドイツ語の文字起こしです。
この内容に関連する重要な表現・語彙・言い回しを10個程度挙げてください。
それぞれに日本語訳と例文（ドイツ語）を添えてください。

【文字起こし】
`,
  feedback: `以下は参加者がドイツ語授業で話したドイツ語の文字起こしです。
以下の点について簡潔にフィードバックしてください：
1. 全体的な評価（良かった点）
2. 修正するとよりよくなる表現・語順・語彙（2〜3点）
3. より自然な言い方の提案

【文字起こし】
`
};

// ===== タブ切り替え =====
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  setStatus('');
}

// ===== 共通 =====
function setResultText(text) {
  finalText = text;
  const el = document.getElementById('result-text');
  if (text.trim()) {
    el.textContent = text;
    el.style.color = '';
  } else {
    el.innerHTML = '<span class="result-empty">テキスト入力または音声認識後にここに表示されます</span>';
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ===== テキスト入力 =====
function useTextInput() {
  const val = document.getElementById('text-input').value.trim();
  if (!val) { toast('テキストを入力してください'); return; }
  setResultText(val);
  setStatus('テキストを確定しました — 下のボタンでコピーして Claude.ai へ');
  // スクロールして結果エリアを見せる
  document.getElementById('result-text').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function clearTextInput() {
  document.getElementById('text-input').value = '';
  setStatus('');
  // resultも音声由来でなければクリア
  if (!voiceFull) setResultText('');
}

// ===== 音声入力 =====
function clearVoice() {
  if (voiceFull && !confirm('音声テキストをすべて削除しますか？')) return;
  voiceFull = '';
  document.getElementById('transcript').innerHTML =
    '<span class="placeholder">Drücken Sie „Aufnahme starten" und sprechen Sie auf Deutsch.</span>';
  document.getElementById('interim').textContent = '';
  setResultText('');
  setStatus('');
}

function copyWith(type) {
  if (!finalText.trim()) { toast('先にテキストを確定してください'); return; }
  const text = (prompts[type] || '') + finalText;
  navigator.clipboard.writeText(text)
    .then(() => {
      const labels = {
        raw: 'テキストをコピーしました',
        correct: 'プロンプトをコピーしました — Claude.ai に貼り付けてください',
        vocab: 'プロンプトをコピーしました — Claude.ai に貼り付けてください',
        feedback: 'プロンプトをコピーしました — Claude.ai に貼り付けてください'
      };
      toast(labels[type]);
    })
    .catch(() => toast('コピーできませんでした'));
}

function toggleRec() {
  if (going) stopRec(); else startRec();
}

function startRec() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setStatus('Chrome または Edge でお試しください（このブラウザは非対応）');
    return;
  }
  rec = new SR();
  rec.lang = 'de-DE';
  rec.continuous = true;
  rec.interimResults = true;

  rec.onstart = () => {
    going = true;
    document.getElementById('btn-rec').classList.add('recording');
    document.getElementById('btn-label').textContent = 'Aufnahme stoppen';
    document.getElementById('rec-badge').classList.add('show');
    const el = document.getElementById('transcript');
    if (el.querySelector('.placeholder')) el.innerHTML = '';
    setStatus('');
  };

  rec.onresult = (e) => {
    let fin = '', inter = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) fin += e.results[i][0].transcript;
      else inter += e.results[i][0].transcript;
    }
    if (fin) {
      voiceFull += (voiceFull ? '\n' : '') + fin;
      document.getElementById('transcript').textContent = voiceFull;
      setResultText(voiceFull);
    }
    document.getElementById('interim').textContent = inter;
  };

  rec.onerror = (e) => {
    if (e.error === 'not-allowed')
      setStatus('マイクの許可が必要です — アドレスバー左のアイコンから許可してください');
    else
      setStatus('エラー: ' + e.error);
    stopRec();
  };

  rec.onend = () => { if (going) rec.start(); };
  rec.start();
}

function stopRec() {
  going = false;
  if (rec) rec.stop();
  document.getElementById('btn-rec').classList.remove('recording');
  document.getElementById('btn-label').textContent = 'Aufnahme starten';
  document.getElementById('rec-badge').classList.remove('show');
  document.getElementById('interim').textContent = '';
  if (voiceFull) setStatus('録音完了 — 下のボタンでコピーして Claude.ai へ');
}
</script>
</body>
</html>
