<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>発言を送る</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', 'Hiragino Sans', 'Meiryo', sans-serif;
    background: #f8f7f4;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 24px 16px 48px;
    max-width: 540px;
    margin: 0 auto;
  }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
  textarea {
    width: 100%; border: 1px solid #e0ddd8;
    border-radius: 8px; padding: 12px;
    font-size: 16px; font-family: inherit;
    resize: none; min-height: 120px;
    background: #faf9f7; color: #1a1a1a;
    outline: none; transition: border-color .15s;
  }
  textarea:focus { border-color: #999; background: #fff; }
  .send-btn {
    width: 100%; padding: 14px;
    font-size: 16px; font-weight: 500;
    border: none; border-radius: 8px;
    background: #1a1a1a; color: #fff;
    cursor: pointer; font-family: inherit;
    margin-top: 10px; transition: background .15s;
  }
  .send-btn:hover { background: #333; }
  .send-btn:disabled { background: #ccc; cursor: not-allowed; }
  .status {
    text-align: center; font-size: 13px;
    color: #888; margin-top: 16px; min-height: 20px;
  }
  .success { color: #27ae60; font-weight: 500; }
  .error { color: #c0392b; }
  .char-count {
    text-align: right; font-size: 12px;
    color: #ccc; margin-top: 4px;
    transition: color .2s;
  }
  .char-count.active { color: #aaa; }
</style>
</head>
<body>

<h1>発言を送る</h1>
<p class="subtitle">入力して送信ボタンを押してください</p>

<textarea id="text-input" placeholder="ここに入力してください..." oninput="updateCount()"></textarea>
<div class="char-count" id="char-count">0</div>
<button class="send-btn" id="send-btn" onclick="sendText()">送信</button>

<div class="status" id="status"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBkzsfU81X3hoF32nlg58zHeHJcVXhAPG0",
  authDomain: "classroom-stt.firebaseapp.com",
  databaseURL: "https://classroom-stt-default-rtdb.firebaseio.com",
  projectId: "classroom-stt",
  storageBucket: "classroom-stt.firebasestorage.app",
  messagingSenderId: "74071031952",
  appId: "1:74071031952:web:dc22ed40bea81c88661815"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const entriesRef = ref(db, 'entries');

function setStatus(msg, type='') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}

window.updateCount = function() {
  const len = document.getElementById('text-input').value.length;
  const el = document.getElementById('char-count');
  el.textContent = len + ' 文字';
  el.classList.toggle('active', len > 0);
};

window.sendText = async function() {
  const input = document.getElementById('text-input');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text) { setStatus('テキストを入力してください', 'error'); return; }
  btn.disabled = true;
  btn.textContent = '送信中...';
  try {
    await push(entriesRef, { text, timestamp: Date.now() });
    input.value = '';
    window.updateCount();
    setStatus('送信しました！', 'success');
    setTimeout(() => setStatus(''), 3000);
  } catch(e) {
    setStatus('送信に失敗しました: ' + e.message, 'error');
  }
  btn.disabled = false;
  btn.textContent = '送信';
};
</script>
</body>
</html>
