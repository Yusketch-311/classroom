<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>発言一覧</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', 'Hiragino Sans', 'BIZ UDGothic', 'Meiryo', sans-serif;
    background: #f8f7f4;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 20px 16px 48px;
    max-width: 640px;
    margin: 0 auto;
  }
  header {
    margin-bottom: 20px;
  }
  h1 { font-size: 15px; font-weight: 500; color: #888; }
  .count-badge {
    display: inline-block;
    font-size: 12px; color: #888;
    background: #f0ede8; padding: 3px 10px;
    border-radius: 20px; margin-top: 6px;
  }
  #feed {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .entry {
    background: #fff;
    border: 1px solid #e8e6e0;
    border-radius: 10px;
    padding: 14px 16px;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .entry-text {
    font-size: 16px;
    line-height: 1.7;
    color: #1a1a1a;
    font-weight: 400;
  }
  .entry-meta {
    font-size: 11px;
    color: #ccc;
    margin-top: 6px;
  }
  .empty {
    text-align: center;
    padding: 60px 0;
    color: #ccc;
    font-size: 14px;
    line-height: 1.8;
  }
</style>
</head>
<body>

<header>
  <h1>発言一覧</h1>
  <span class="count-badge" id="count">0 件</span>
</header>

<div id="feed">
  <div class="empty" id="empty">
    発言を待っています...
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBkzsfU81X3hoF32nlg58zHeHJcVXhAPG0",
  authDomain: "classroom-stt.firebaseapp.com",
  databaseURL: "https://classroom-stt-default-rtdb.firebaseio.com",
  projectId: "classroom-stt",
  storageBucket: "classroom-stt.firebasestorage.app",
  messagingSenderId: "74071031952",
  appId: "1:74071031952:web:dc22ed40bea81c88661815"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const entriesRef = ref(db, 'entries');

let count = 0;

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

onChildAdded(entriesRef, (snapshot) => {
  const data = snapshot.val();
  if (!data || !data.text) return;

  count++;
  document.getElementById('count').textContent = count + ' 件';
  document.getElementById('empty').style.display = 'none';

  const div = document.createElement('div');
  div.className = 'entry';
  const time = new Date(data.timestamp || Date.now());
  const timeStr = time.getHours() + ':' + String(time.getMinutes()).padStart(2,'0');
  div.innerHTML = `
    <div class="entry-text">${escapeHtml(data.text)}</div>
    <div class="entry-meta">${timeStr}</div>
  `;
  document.getElementById('feed').appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
});
</script>
</body>
</html>
